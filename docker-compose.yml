services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: hd_app
    restart: unless-stopped
    volumes:
      - .:/help_desk
      - app_data:/app_data
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    networks:
      - app_network

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - app_network
    volumes:
      - postgres_data:/var/lib/postgresql
  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A helpdesk worker -l info
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app_network
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 2s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - app_network
    command: ["redis-server"]

volumes:
  app_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
