<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Reassignment Notification</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #333;
        background-color: #f7f9fc;
        margin: 0;
        padding: 20px;
    }

    .email-container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }


    .header {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        padding: 30px 20px;
        text-align: center;
    }

    .header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 600;
    }

    .content {
        padding: 30px;
    }


    .card {
        background: #f0fdf4;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 25px;
        border-left: 4px solid #10b981;
    }

    .card-title {
        font-size: 18px;
        font-weight: 600;
        color: #065f46;
        margin-top: 0;
        margin-bottom: 10px;
    }

    .detail-item {
        display: flex;
        margin-bottom: 12px;
        align-items: flex-start;
    }

    .detail-label {
        font-weight: 600;
        min-width: 120px;
        color: #047857;
    }

    .detail-value {
        flex: 1;
        color: #064e3b;
    }

    .footer {
        text-align: center;
        padding: 20px;
        color: #047857;
        font-size: 14px;
        background: #ecfdf5;
        border-top: 1px solid #d1fae5;
    }


    .btn {
        display: inline-block;
        background: #10b981;
        color: white !important;
        text-decoration: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: 600;
        margin: 20px 0;
        transition: all 0.3s ease;
    }

    .btn:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
    }

    .status-badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
        background-color: #d1fae5;
        color: #047857;
    }

    .status-open {
        background-color: #dcfce7;
        color: #166534;
    }

    .status-in-progress {
        background-color: #fef9c3;
        color: #854d0e;
    }

    .status-resolved {
        background-color: #bbf7d0;
        color: #166534;
    }

    .user-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #10b981;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
        margin-right: 15px;
    }

    .user-info {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .user-name {
        font-weight: 600;
        font-size: 18px;
        color: #064e3b;
    }

    .user-role {
        color: #047857;
        font-size: 14px;
    }

    @media (max-width: 600px) {
        .content {
            padding: 20px 15px;
        }

        .detail-item {
            flex-direction: column;
        }

        .detail-label {
            margin-bottom: 5px;
        }
    }
</style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <h1>Task Reassignment</h1>
        </div>

        <div class="content">

            <p>You've been unassigned from task:</p>

            <div class="card">
                <h2 class="card-title">{{ ticket.title }}</h2>


                <div class="detail-item">
                    <span class="detail-label">Organization:</span>
                    <span class="detail-value">{{ ticket.organization.name }}</span>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Status:</span>
                    <span class="detail-value">
                        <span class="status-badge status-{{ ticket.status|lower|cut:' ' }}">{{ ticket.get_status_display }}</span>
                    </span>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Created:</span>
                    <span class="detail-value">{{ ticket.created_at|date:"M d, Y" }}</span>
                </div>
            </div>

            <p style="margin-bottom: 25px;">
                <strong>Task description:</strong><br>
                {{ ticket.description|truncatewords:30 }}
            </p>

        </div>
    </div>
</body>
</html>
